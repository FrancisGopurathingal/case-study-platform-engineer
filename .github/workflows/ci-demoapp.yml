name: CI - .NET Build & Test

on:
  pull_request:
    branches:
      - main
  
permissions:
  contents: read

jobs:
  build-and-test:
    
    # Using windows-latest since the same is used in the given ADO pipeline.
    runs-on: windows-latest

    env:
      SOLUTION: DemoSolution.sln
      CONFIGURATION: Release
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setting up .NET 8 SDK using the official GitHub Action provided by Microsoft.  
      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      
      # Cache the NuGet packages to speed up subsequent runs.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') || 'no-projects' }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }} --locked-mode

      # Replacing ADO VSBuild task with dotnet build command.
      - name: Build solution
        run: dotnet build ${{ env.SOLUTION }} --configuration ${{ env.CONFIGURATION }} --no-restore

      # Replacing ADO VSTest task with dotnet test command.
      - name: Run tests
        shell: bash
        run: |
          dotnet test ${{ env.SOLUTION }} \
            --configuration ${{ env.CONFIGURATION }} \
            --no-build \
            --settings coverlet.runsettings \
            --logger "trx"
